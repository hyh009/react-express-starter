services:
  redis:
    image: redis:7
    container_name: redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data

volumes:
  redis_data:
